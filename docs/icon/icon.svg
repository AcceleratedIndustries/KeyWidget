<?xml version="1.0" encoding="UTF-8"?>
<!--
  KeyWidget app icon — Apple macOS "materials" style.
  1024×1024 canvas. The rounded-square body is 824×824 centered
  (100px padding on each side), matching Apple's macOS icon grid.
  This is the source-of-truth for the icon design. The actual
  rasterized PNGs shipped with the app are generated by
  scripts/gen-icon.swift; keep the two visually in sync.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Frosted vertical gradient: light at top, cooler at bottom. -->
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6F8FC"/>
      <stop offset="1" stop-color="#CDD6E2"/>
    </linearGradient>
    <!-- Upper highlight band for glassy sheen. -->
    <linearGradient id="sheen" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.35"/>
    </linearGradient>
    <!-- Soft outer drop shadow on the body. -->
    <filter id="bodyShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="12"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle drop shadow on the glyph for depth. -->
    <filter id="glyphShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7"/>
      <feOffset dy="4"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip for the highlight so it doesn't bleed past the body. -->
    <clipPath id="bodyClip">
      <rect x="100" y="100" width="824" height="824" rx="184" ry="184"/>
    </clipPath>
  </defs>

  <!-- Body -->
  <g filter="url(#bodyShadow)">
    <rect x="100" y="100" width="824" height="824" rx="184" ry="184" fill="url(#body)"/>
  </g>

  <!-- Glassy top sheen, clipped to body shape -->
  <g clip-path="url(#bodyClip)">
    <rect x="100" y="100" width="824" height="450" fill="url(#sheen)"/>
  </g>

  <!-- Bright inner rim -->
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="6"/>
  <!-- Subtle outer rim for definition -->
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184"
        fill="none" stroke="#8C96A5" stroke-opacity="0.35" stroke-width="2"/>

  <!-- "?" glyph -->
  <text x="512" y="700"
        text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif"
        font-size="620"
        font-weight="700"
        fill="#2A303C"
        filter="url(#glyphShadow)">?</text>
</svg>
